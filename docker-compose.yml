services:
  3x-ui-exporter:
    container_name: 3x-ui-exporter
    image: ghcr.io/zbndev/3x-ui-exporter:latest
    ports:
      - "9847:9847"
    env_file:
      - .env
    environment:
      - EXPORTER_PORT=9847
      - SCRAPE_TIMEOUT=10
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9847/health"]
      interval: 30s
      timeout: 5s
      retries: 3
